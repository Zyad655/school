<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المتابعة الدراسية</title>
    <style>
        :root {
            --bg-color: #E8EDF2;       /* الخلفية الثلجية الناعمة */
            --primary-dark: #2C3947;   /* الكحلي الداكن المعتمد */
            --accent-blue: #547A95;    /* الأزرق الهادئ */
            --gold-accent: #C2A56D;    /* الذهبي الفخم للأزرار والحدود */
            --card-bg: #FFFFFF;        
            --muted-gray: #7f8c8d;
            --disabled-bg: #bdc3c7;
        }

        * {
            box-shadow: none;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-dark);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        .top-date-bar {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 10px;
            text-align: right;
            padding-right: 5px;
        }

        .main-header-box {
            background-color: transparent;
            border: 3px solid var(--primary-dark);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            max-width: 420px;
            margin: 0 auto 30px auto;
            background-color: #f4f7f9;
        }

        .main-header-box h1 {
            font-size: 2rem;
            color: var(--primary-dark);
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .nav-sections-bar {
            display: flex;
            background-color: var(--primary-dark);
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
            border-bottom: 4px solid var(--gold-accent);
        }

        .nav-item {
            flex: 1;
            text-align: center;
            padding: 15px 10px;
            font-weight: 700;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.05rem;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item:last-child {
            border-left: none;
        }

        .nav-item.scheduled-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .nav-item.not-scheduled-item {
            background-color: #344454;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 500;
        }
        .nav-item.not-scheduled-item:hover {
            background-color: #3a4d5f;
        }

        .nav-item.active {
            background-color: var(--gold-accent) !important;
            color: var(--primary-dark) !important;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .sync-badge {
            background-color: #ffffff;
            border: 1px solid #ced4da;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-edit-toggle {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .display-main-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            border-right: 5px solid var(--gold-accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            margin-bottom: 25px;
            position: relative;
        }

        .card-header-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--primary-dark);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .view-pane { display: none; }
        .view-pane.active-pane { display: block !important; }

        .summary-list {
            list-style: none;
            margin-top: 15px;
        }

        .summary-list li {
            font-size: 1.15rem;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px dashed #e9ecef;
            line-height: 1.8;
        }
        .summary-list li:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        .summary-subject-row {
            display: block;
            margin-bottom: 8px;
        }

        .summary-note-block {
            display: inline-block;
            background-color: #FFF9E6; 
            color: #B38600; 
            padding: 4px 12px; 
            border-radius: 6px; 
            font-size: 0.95rem; 
            border: 1px solid #FFE699; 
            font-weight: 600;
            margin-top: 6px;
            margin-right: 25px;
            line-height: 1.5;
            max-width: 90%;
        }

        .pinned-badge-ui {
            background-color: #e74c3c;
            color: white;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
            font-weight: 700;
            display: inline-block;
            vertical-align: middle;
        }

        .subject-field-box {
            margin-bottom: 20px;
        }

        .field-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }

        .btn-pin-toggle {
            display: none;
            background-color: #f0f2f5;
            border: 1px solid #ccc;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            color: #555;
            transition: all 0.2s;
        }
        body.edit-mode .btn-pin-toggle { display: inline-block; }
        .btn-pin-toggle.is-pinned {
            background-color: #e74c3c;
            color: white;
            border-color: #c0392b;
        }

        .text-data-view {
            font-size: 1rem;
            color: var(--primary-dark);
            padding-right: 5px;
            min-height: 24px;
        }

        .field-textarea {
            width: 100%;
            min-height: 60px;
            padding: 10px;
            border: 1px solid var(--accent-blue);
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
            display: none;
            margin-top: 5px;
            resize: vertical;
        }

        body.edit-mode .field-textarea { display: block; }
        body.edit-mode .text-data-view { display: none; }

        .btn-attachment {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: var(--accent-blue);
            color: white !important;
            text-decoration: none !important;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.95rem;
            margin-top: 8px;
            transition: background-color 0.2s;
        }
        .btn-attachment:hover { background-color: var(--primary-dark); }

        .day-status-badge {
            font-size: 0.8rem;
            background-color: var(--gold-accent);
            color: var(--primary-dark);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
        }

        .admin-action-footer {
            display: none;
            justify-content: flex-end;
            gap: 12px;
            background-color: var(--card-bg);
            padding: 15px 25px;
            border-radius: 12px;
            border: 2px solid var(--accent-blue);
            margin-top: 20px;
        }
        body.edit-mode .admin-action-footer { display: flex; position: sticky; bottom: 20px; z-index: 10; }

        .btn {
            padding: 10px 20px; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem;
        }
        .btn-success { background-color: #2ecc71; color: white; }
        .btn-secondary { background-color: #95a5a6; color: white; }
        .btn-danger { background-color: #e74c3c; color: white; }

        .modal-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(44, 57, 71, 0.5); display: flex; justify-content: center; align-items: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        .modal-mask.show { opacity: 1; pointer-events: auto; }
        .modal-box { background-color: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 380px; text-align: center; border: 2px solid var(--gold-accent); }
        .modal-box input { width: 100%; padding: 10px; border: 1px solid var(--accent-blue); border-radius: 6px; text-align: center; margin: 15px 0; font-size: 1rem; }

        .footer-credits-bar {
            text-align: center;
            padding: 20px;
            margin-top: 50px;
            background-color: var(--primary-dark);
            color: #ffffff;
            border-top: 4px solid var(--gold-accent);
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .footer-credits-bar span {
            color: var(--gold-accent);
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-date-bar" id="live-date-text">جاري تحميل التاريخ...</div>

    <header class="main-header-box">
        <h1>لوحة المتابعة الدراسية</h1>
    </header>

    <nav class="nav-sections-bar" id="navigation-root-bar"></nav>

    <div class="control-row">
        <div class="sync-badge">
            <span style="color: #2ecc71;">●</span> التزامن السحابي: متصل ومؤمن
        </div>
        <button id="toggle-edit-mode-btn" class="btn-edit-toggle" onclick="promptPasswordVerification()">🔧 تفعيل التعديل</button>
    </div>

    <main class="display-main-card">
        
        <div id="view-pane-home" class="view-pane active-pane">
            <div class="card-header-title">📋 الموجز الدراسي اليومي</div>
            <div id="dynamic-summary-target">جاري مزامنة المدخلات الدراسية الحالية...</div>
        </div>

        <div id="subject-cards-dynamic-container"></div>

    </main>

    <footer class="admin-action-footer">
        <button class="btn btn-danger" onclick="wipeTodayCloudData()" style="margin-left: auto;">🗑️ مسح بيانات اليوم</button>
        <button class="btn btn-secondary" onclick="abortEditingSession()" style="margin-right: 8px;">✖ إلغاء</button>
        <button class="btn btn-success" onclick="commitEditsToCloud()">💾 حفظ التعديلات سحابياً</button>
    </footer>
</div>

<footer class="footer-credits-bar">
    جميع الحقوق محفوظة © لوحة المتابعة الدراسية الذكية | تم التطوير بواسطة <span>zyad ashry</span>
</footer>

<div class="modal-mask" id="auth-modal-mask" onclick="if(event.target.id === 'auth-modal-mask') closeVerificationModal()">
    <div class="modal-box">
        <h3 style="color: var(--primary-dark);">التحقق السري للمسؤول</h3>
        <input type="password" id="auth-key-field" placeholder="أدخل رمز التعديل السري..." onkeydown="if(event.key === 'Enter') executeAuthVerification()">
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="btn btn-secondary" onclick="closeVerificationModal()">إلغاء</button>
            <button class="btn btn-success" style="background-color: var(--accent-blue);" onclick="executeAuthVerification()">تحقق</button>
        </div>
    </div>
</div>

<script>
    const FIREBASE_DB_ENDPOINT = "https://school-dashboard-4a36d-default-rtdb.firebaseio.com";
    const SECRET_PROTECTION_KEY = "9561";

    const WEEKLY_SCHEDULE_MAP = {
        "الأحد": ["تقنيه رقميه", "انجليزي", "كيمياء", "فنون", "رياضيات"],
        "الإثنين": ["انجليزي", "كيمياء", "تقنيه رقميه", "احياء", "رياضيات", "توحيد"],
        "الثلاثاء": ["تقنيه رقميه", "احياء", "فنون", "انجليزي", "رياضيات", "كيمياء"],
        "الأربعاء": ["رياضيات", "انجليزي", "احياء", "كيمياء", "تقنيه رقميه"],
        "الخميس": ["انجليزي", "احياء", "كيمياء", "رياضيات"],
        "الجمعة": [], "السبت": []
    };

    const MASTER_SUBJECT_LIST = ["رياضيات", "احياء", "انجليزي", "كيمياء", "توحيد", "فنون", "تقنيه رقميه"];

    let calculatedISODate = "";
    let dayNameArabic = "";
    let systemSortedSubjects = [];
    let currentPinnedStatusMap = {}; 

    window.addEventListener('DOMContentLoaded', () => {
        setupSystemClock();
        processSubjectSorting();
        buildNavigationTabs();
        buildSubjectCardsMarkup();
        synchronizeCloudContent();
    });

    function setupSystemClock() {
        const dateObj = new Date();
        const daysArabic = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
        dayNameArabic = daysArabic[dateObj.getDay()];
        
        const year = dateObj.getFullYear();
        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
        const day = String(dateObj.getDate()).padStart(2, '0');
        calculatedISODate = `${year}-${month}-${day}`;

        const formattedText = dateObj.toLocaleDateString('ar-SA', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        document.getElementById('live-date-text').innerText = formattedText;
    }

    function processSubjectSorting() {
        const todaySchedule = WEEKLY_SCHEDULE_MAP[dayNameArabic] || [];
        systemSortedSubjects = [...todaySchedule];
        MASTER_SUBJECT_LIST.forEach(subject => {
            if (!systemSortedSubjects.includes(subject)) {
                systemSortedSubjects.push(subject);
            }
        });
    }

    function buildNavigationTabs() {
        const navContainer = document.getElementById('navigation-root-bar');
        navContainer.innerHTML = '';

        const homeTab = document.createElement('div');
        homeTab.className = 'nav-item active';
        homeTab.id = 'tab-trigger-home';
        homeTab.innerText = 'الرئيسية';
        homeTab.onclick = () => activateViewSegment('home');
        navContainer.appendChild(homeTab);

        const todaySchedule = WEEKLY_SCHEDULE_MAP[dayNameArabic] || [];

        systemSortedSubjects.forEach(subject => {
            const tab = document.createElement('div');
            tab.id = `tab-trigger-${subject}`;
            
            if (todaySchedule.includes(subject)) {
                tab.className = 'nav-item scheduled-item';
                tab.innerText = subject;
            } else {
                tab.className = 'nav-item not-scheduled-item';
                tab.innerText = subject;
            }
            tab.onclick = () => activateViewSegment(subject);
            navContainer.appendChild(tab);
        });
    }

    function buildSubjectCardsMarkup() {
        const cardsContainer = document.getElementById('subject-cards-dynamic-container');
        cardsContainer.innerHTML = '';
        const todaySchedule = WEEKLY_SCHEDULE_MAP[dayNameArabic] || [];

        systemSortedSubjects.forEach(subject => {
            const isScheduled = todaySchedule.includes(subject);
            const pane = document.createElement('div');
            pane.id = `view-pane-${subject}`;
            pane.className = 'view-pane';

            pane.innerHTML = `
                <div class="card-header-title">
                    <span>${subject}</span>
                    ${isScheduled ? '<span class="day-status-badge">مجدولة اليوم</span>' : ''}
                </div>
                
                <div class="subject-field-box">
                    <div class="field-title">📝 الواجبات المدرسية والمهام</div>
                    <div class="text-data-view" id="view-text-${subject}-assignments">لا توجد واجبات مسجلة لهذه المادة اليوم.</div>
                    <textarea class="field-textarea" id="edit-input-${subject}-assignments" placeholder="اكتب الواجبات هنا..."></textarea>
                </div>

                <div class="subject-field-box">
                    <div class="field-title">
                        <span>🚀 المشاريع والأعمال الأدائية</span>
                        <button type="button" class="btn-pin-toggle" id="pin-btn-${subject}-projects" onclick="togglePinState('${subject}', 'projects')">📌 تثبيت</button>
                    </div>
                    <div class="text-data-view" id="view-text-${subject}-projects">لا توجد مشاريع قائمة.</div>
                    <textarea class="field-textarea" id="edit-input-${subject}-projects" placeholder="اكتب متطلبات المشاريع هنا..."></textarea>
                </div>

                <div class="subject-field-box">
                    <div class="field-title">
                        <span>🔗 روابط الملخصات والمرفقات</span>
                        <button type="button" class="btn-pin-toggle" id="pin-btn-${subject}-summaries" onclick="togglePinState('${subject}', 'summaries')">📌 تثبيت</button>
                    </div>
                    <div class="text-data-view" id="view-text-${subject}-summaries">لا توجد ملخصات متوفرة.</div>
                    <textarea class="field-textarea" id="edit-input-${subject}-summaries" placeholder="ضع رابط المرفق السحابي (http://...) هنا..."></textarea>
                    <div id="attachment-preview-area-${subject}"></div>
                </div>

                <div class="subject-field-box">
                    <div class="field-title">
                        <span>📌 ملاحظات وتنبيهات مخصصة</span>
                        <button type="button" class="btn-pin-toggle" id="pin-btn-${subject}-notes" onclick="togglePinState('${subject}', 'notes')">📌 تثبيت</button>
                    </div>
                    <div class="text-data-view" id="view-text-${subject}-notes">لا توجد ملاحظات إضافية.</div>
                    <textarea class="field-textarea" id="edit-input-${subject}-notes" placeholder="اكتب أي تنبيه أو ملاحظة مخصصة هنا..."></textarea>
                </div>
            `;
            cardsContainer.appendChild(pane);
        });
    }

    function togglePinState(subject, field) {
        const btn = document.getElementById(`pin-btn-${subject}-${field}`);
        const key = `${subject}_${field}`;
        if (currentPinnedStatusMap[key]) {
            currentPinnedStatusMap[key] = false;
            btn.classList.remove('is-pinned');
            btn.innerText = "📌 تثبيت";
        } else {
            currentPinnedStatusMap[key] = true;
            btn.classList.add('is-pinned');
            btn.innerText = "📌 مثبت دائم";
        }
    }

    function activateViewSegment(targetId) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.view-pane').forEach(el => el.classList.remove('active-pane'));

        if (targetId === 'home') {
            document.getElementById('tab-trigger-home').classList.add('active');
            document.getElementById('view-pane-home').classList.add('active-pane');
        } else {
            document.getElementById(`tab-trigger-${targetId}`).classList.add('active');
            document.getElementById(`view-pane-${targetId}`).classList.add('active-pane');
        }
    }

    function synchronizeCloudContent() {
        fetch(`${FIREBASE_DB_ENDPOINT}/pinned_data.json`)
        .then(res => res.json())
        .then(pinnedData => {
            currentPinnedStatusMap = {};
            if(pinnedData) {
                Object.keys(pinnedData).forEach(key => {
                    currentPinnedStatusMap[key] = pinnedData[key].isPinned || false;
                });
            }

            fetch(`${FIREBASE_DB_ENDPOINT}/${calculatedISODate}.json`)
            .then(r => r.json())
            .then(todayData => {
                
                MASTER_SUBJECT_LIST.forEach(sub => {
                    const fields = ['assignments', 'projects', 'summaries', 'notes'];
                    
                    fields.forEach(f => {
                        const viewElement = document.getElementById(`view-text-${sub}-${f}`);
                        const inputElement = document.getElementById(`edit-input-${sub}-${f}`);
                        const pinBtn = document.getElementById(`pin-btn-${sub}-${f}`);
                        
                        const pinKey = `${sub}_${f}`;
                        const isPinned = currentPinnedStatusMap[pinKey] || false;

                        if(pinBtn) {
                            if(isPinned) { pinBtn.classList.add('is-pinned'); pinBtn.innerText = "📌 مثبت دائم"; }
                            else { pinBtn.classList.remove('is-pinned'); pinBtn.innerText = "📌 تثبيت"; }
                        }

                        let val = "";
                        if (isPinned && pinnedData && pinnedData[pinKey]) {
                            val = pinnedData[pinKey].value ? pinnedData[pinKey].value.trim() : "";
                        } else if (todayData && todayData[sub] && todayData[sub][f]) {
                            val = todayData[sub][f].trim();
                        }
                        
                        if(inputElement) inputElement.value = val;

                        if(viewElement) {
                            if (f === 'assignments' && !val) viewElement.innerText = "لا توجد واجبات مسجلة لهذه المادة اليوم.";
                            else if (f === 'projects' && !val) viewElement.innerText = "لا توجد مشاريع قائمة.";
                            else if (f === 'summaries' && !val) viewElement.innerText = "لا توجد ملخصات متوفرة.";
                            else if (f === 'notes' && !val) viewElement.innerText = "لا توجد ملاحظات إضافية.";
                            else {
                                viewElement.innerHTML = isPinned ? `<span class="pinned-badge-ui">مثبت 📌</span> ${val}` : val;
                            }
                        }
                    });

                    const sumVal = document.getElementById(`edit-input-${sub}-summaries`).value.trim();
                    const previewDiv = document.getElementById(`attachment-preview-area-${sub}`);
                    const textSumView = document.getElementById(`view-text-${sub}-summaries`);
                    const isSummaryPinned = currentPinnedStatusMap[`${sub}_summaries`] || false;
                    
                    if (sumVal.startsWith('http://') || sumVal.startsWith('https://')) {
                        if (textSumView) textSumView.style.display = 'none';
                        let pinBadge = isSummaryPinned ? `<span class="pinned-badge-ui" style="margin-right:8px;">مثبت 📌</span>` : '';
                        previewDiv.innerHTML = `${pinBadge}<a href="${sumVal}" target="_blank" class="btn-attachment">📄 فتح ملف الملخص المرفق</a>`;
                    } else {
                        if (textSumView) textSumView.style.display = 'block';
                        previewDiv.innerHTML = '';
                    }
                });
                compileDashboardSummary();
            });
        });
    }

    function compileDashboardSummary() {
        const display = document.getElementById('dynamic-summary-target');
        const activeSchedule = WEEKLY_SCHEDULE_MAP[dayNameArabic] || [];

        if (activeSchedule.length === 0) {
            display.innerHTML = `<p style="font-weight:700; color: var(--muted-gray);">اليوم عطلة نهاية الأسبوع، لا توجد حصص مجدولة.</p>`;
            return;
        }

        let html = `<ol class="summary-list">`;
        activeSchedule.forEach((subject, index) => {
            const assign = document.getElementById(`edit-input-${subject}-assignments`).value.trim();
            const sumLink = document.getElementById(`edit-input-${subject}-summaries`).value.trim();
            
            const isProjectPinned = currentPinnedStatusMap[`${subject}_projects`] || false;
            const isNotePinned = currentPinnedStatusMap[`${subject}_notes`] || false;
            const isSummaryPinned = currentPinnedStatusMap[`${subject}_summaries`] || false;

            const projectVal = document.getElementById(`edit-input-${subject}-projects`).value.trim();
            const notes = document.getElementById(`edit-input-${subject}-notes`).value.trim();

            let details = "";
            if (assign) {
                details = `<span style="color:var(--primary-dark);">${assign}</span>`;
            } else if (projectVal) {
                details = `<span style="color:var(--primary-dark); font-weight:600;">${isProjectPinned ? '📌 ' : ''}مشروع قائم: ${projectVal}</span>`;
            } else if (sumLink.startsWith('http')) {
                details = `<span style="color: var(--accent-blue); font-weight: 700;">💡 ${isSummaryPinned ? '📌 ' : ''}يتوفر ملف ملخص مرفق بداخل قسم المادة</span>`;
            } else {
                details = `<span style="color: var(--muted-gray); font-style: italic;">(لا يوجد واجبات أو ملخصات مسجلة اليوم)</span>`;
            }

            let pinBadgeText = isNotePinned ? `<span class="pinned-badge-ui">مثبت 📌</span> ` : "";
            let noteBlock = notes ? `<div class="summary-note-block">⚠️ ملاحظة: ${pinBadgeText}${notes}</div>` : "";

            html += `
                <li>
                    <div class="summary-subject-row">
                        <strong style="color: var(--accent-blue); cursor: pointer;" onclick="activateViewSegment('${subject}')">${index + 1}. ${subject} — </strong> 
                        ${details}
                    </div>
                    ${noteBlock}
                </li>`;
        });
        html += `</ol>`;
        display.innerHTML = html;
    }

    function promptPasswordVerification() {
        if (document.body.classList.contains('edit-mode')) { disableEditingEnvironment(); return; }
        document.getElementById('auth-key-field').value = '';
        document.getElementById('auth-modal-mask').classList.add('show');
        setTimeout(() => document.getElementById('auth-key-field').focus(), 100);
    }

    function closeVerificationModal() { document.getElementById('auth-modal-mask').classList.remove('show'); }

    function executeAuthVerification() {
        if (document.getElementById('auth-key-field').value === SECRET_PROTECTION_KEY) {
            closeVerificationModal();
            enableEditingEnvironment();
        } else {
            alert("رمز الحماية السري خاطئ!");
        }
    }

    function enableEditingEnvironment() {
        document.body.classList.add('edit-mode');
        document.getElementById('toggle-edit-mode-btn').innerText = "🔒 قفل التعديل";
        
        document.getElementById('view-pane-home').classList.add('active-pane');
        document.querySelectorAll('.view-pane').forEach(pane => {
            pane.classList.add('active-pane');
            const textSummaryView = pane.querySelector(`[id^="view-text-"][id$="-summaries"]`);
            if(textSummaryView) textSummaryView.style.display = 'none';
        });
    }

    function disableEditingEnvironment() {
        document.body.classList.remove('edit-mode');
        document.getElementById('toggle-edit-mode-btn').innerText = "🔧 تفعيل التعديل";
        activateViewSegment('home');
    }

    function commitEditsToCloud() {
        const todayPacket = {};
        const pinnedPacket = {};

        MASTER_SUBJECT_LIST.forEach(sub => {
            todayPacket[sub] = {
                assignments: document.getElementById(`edit-input-${sub}-assignments`).value.trim(),
                projects: document.getElementById(`edit-input-${sub}-projects`).value.trim(),
                summaries: document.getElementById(`edit-input-${sub}-summaries`).value.trim(),
                notes: document.getElementById(`edit-input-${sub}-notes`).value.trim()
            };

            // حفظ حالة التثبيت للمشاريع والملخصات والملاحظات
            ['projects', 'summaries', 'notes'].forEach(f => {
                const pinKey = `${sub}_${f}`;
                if (currentPinnedStatusMap[pinKey]) {
                    pinnedPacket[pinKey] = {
                        isPinned: true,
                        value: document.getElementById(`edit-input-${sub}-${f}`).value.trim()
                    };
                } else {
                    pinnedPacket[pinKey] = { isPinned: false, value: "" };
                }
            });
        });

        fetch(`${FIREBASE_DB_ENDPOINT}/${calculatedISODate}.json`, { method: 'PUT', body: JSON.stringify(todayPacket) })
        .then(() => {
            return fetch(`${FIREBASE_DB_ENDPOINT}/pinned_data.json`, { method: 'PUT', body: JSON.stringify(pinnedPacket) });
        })
        .then(() => {
            disableEditingEnvironment();
            synchronizeCloudContent();
            alert("تم حفظ وتحديث التعديلات والمثبتات سحابياً بنجاح! 💾📌");
        });
    }

    function abortEditingSession() {
        synchronizeCloudContent();
        disableEditingEnvironment();
    }

    function wipeTodayCloudData() {
        if(!confirm("هل أنت متأكد من حذف بيانات هذا اليوم؟ (لن يتم حذف الملاحظات والمشاريع والملخصات الثابتة دائماً)")) return;
        fetch(`${FIREBASE_DB_ENDPOINT}/${calculatedISODate}.json`, { method: 'DELETE' })
        .then(() => {
            disableEditingEnvironment();
            synchronizeCloudContent();
        });
    }
</script>

</body>
</html>
