<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المتابعة الدراسية الذكية</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --warning-color: #f1c40f;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --muted-color: #7f8c8d;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            background: linear-gradient(135deg, var(--primary-color), #34495e);
            color: white;
            padding: 30px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        #current-date-display {
            font-size: 1.2rem;
            opacity: 0.9;
            font-weight: 300;
        }

        .top-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .status-sync {
            background-color: #e8f8f5;
            color: var(--success-color);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .btn {
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-primary:hover { background-color: #2980b9; }

        .btn-success {
            background-color: var(--success-color);
            color: white;
        }

        .btn-success:hover { background-color: #27ae60; }

        .btn-danger {
            background-color: var(--danger-color);
            color: white;
        }

        .btn-danger:hover { background-color: #c0392b; }

        .btn-secondary {
            background-color: #95a5a6;
            color: white;
        }

        .btn-secondary:hover { background-color: #7f8c8d; }

        .summary-card {
            background-color: #eef7fe;
            border-right: 5px solid var(--accent-color);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        .summary-card h2 {
            font-size: 1.4rem;
            color: var(--primary-color);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .summary-content {
            font-size: 1.05rem;
            color: #34495e;
        }

        .summary-list {
            margin-right: 20px;
            margin-top: 10px;
        }

        .summary-list li {
            margin-bottom: 8px;
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .subject-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
        }

        .subject-card.scheduled { border-top: 4px solid var(--success-color); }
        .subject-card.not-scheduled { border-top: 4px solid var(--muted-color); opacity: 0.85; }

        .subject-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .subject-title { font-size: 1.25rem; font-weight: 700; color: var(--primary-color); }
        .badge { font-size: 0.75rem; font-weight: 700; padding: 4px 8px; border-radius: 12px; }
        .badge-scheduled { background-color: #e8f8f5; color: var(--success-color); }
        .badge-not-scheduled { background-color: #f2f4f4; color: var(--muted-color); }

        .field-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        .field-label { font-size: 0.85rem; font-weight: 600; color: var(--muted-color); margin-bottom: 4px; }
        
        .field-input {
            width: 100%;
            min-height: 60px;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: #fafbfc;
            font-size: 0.95rem;
            font-family: inherit;
            resize: vertical;
            color: var(--text-color);
        }

        .field-input:disabled {
            background-color: #fafbfc;
            border-color: transparent;
            padding: 0;
            resize: none;
            min-height: auto;
        }

        .link-preview-container a {
            display: inline-block;
            margin-top: 5px;
            color: var(--accent-color);
            text-decoration: underline;
            font-size: 0.9rem;
            font-weight: bold;
        }

        body.edit-mode .field-input:not(:disabled) { background-color: #ffffff; border-color: #cbd5e1; }

        .action-panel {
            display: none;
            justify-content: flex-end;
            gap: 12px;
            background-color: #ffffff;
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-top: 20px;
        }

        body.edit-mode .action-panel { display: flex; position: sticky; bottom: 20px; z-index: 10; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5); display: flex; justify-content: center; align-items: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal { background-color: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 400px; }
        .modal h3 { margin-bottom: 15px; color: var(--primary-color); }
        .modal input[type="password"] { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 6px; text-align: center; margin-bottom: 15px; }
        .modal-error { color: var(--danger-color); font-size: 0.85rem; margin-bottom: 15px; display: none; font-weight: 600; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>لوحة المتابعة الدراسية الذكية السحابية</h1>
        <div id="current-date-display">جاري تحميل التاريخ...</div>
    </header>

    <div class="top-controls">
        <div class="status-sync">☁️ متصل بالسحابة تلقائياً</div>
        <button id="enter-edit-btn" class="btn btn-primary" onclick="openPasswordModal()">🔒 تفعيل التعديل</button>
    </div>

    <section class="summary-card">
        <h2>📋 موجز واجبات اليوم</h2>
        <div id="summary-view" class="summary-content">جاري مزامنة وجلب البيانات السحابية الحالية...</div>
    </section>

    <main class="subjects-grid" id="subjects-display-grid"></main>

    <footer class="action-panel" id="edit-mode-footer">
        <button class="btn btn-danger" onclick="clearCurrentDateData()" style="margin-left: auto;">🗑️ مسح بيانات اليوم</button>
        <button class="btn btn-secondary" onclick="cancelEditing()">✖ إلغاء</button>
        <button class="btn btn-success" onclick="saveAllEdits()">💾 حفظ التعديلات سحابياً</button>
    </footer>
</div>

<div class="modal-overlay" id="password-modal-overlay" onclick="closePasswordModalViaOverlay(event)">
    <div class="modal">
        <h3>أدخل كلمة سر التعديل</h3>
        <input type="password" id="admin-password-input" placeholder="أدخل الرمز السري هنا..." onkeydown="handleModalKeyDown(event)">
        <div id="modal-error-txt" class="modal-error">كلمة السر خاطئة! تم رفض الإذن.</div>
        <div class="modal-buttons">
            <button class="btn btn-secondary" onclick="closePasswordModal()">إلغاء</button>
            <button class="btn btn-primary" onclick="submitPasswordVerification()">تحقق</button>
        </div>
    </div>
</div>

<script>
    // 🔗 الرابط السحابي المباشر الخاص بقاعدة بياناتك (تم الدمج بنجاح)
    const FIREBASE_DB_URL = "https://school-dashboard-4a36d-default-rtdb.firebaseio.com";

    const WEEKLY_SCHEDULE_MAP = {
        "الأحد": ["تقنيه رقميه", "انجليزي", "كيمياء", "فنون", "رياضيات"],
        "الإثنين": ["انجليزي", "كيمياء", "تقنيه رقميه", "احياء", "رياضيات", "توحيد"],
        "الثلاثاء": ["تقنيه رقميه", "احياء", "فنون", "انجليزي", "رياضيات", "كيمياء"],
        "الأربعاء": ["رياضيات", "انجليزي", "احياء", "كيمياء", "تقنيه رقميه"],
        "الخميس": ["انجليزي", "احياء", "كيمياء", "رياضيات"],
        "الجمعة": [], "السبت": []
    };

    const MASTER_SUBJECT_LIST = ["رياضيات", "احياء", "انجليزي", "كيمياء", "توحيد", "فنون", "تقنيه رقميه"];
    const PROTECTION_KEY = "9561";

    let currentISODate = "";
    let currentDayOfWeek = "";

    window.addEventListener('DOMContentLoaded', () => {
        initializeDateTracking();
        renderSubjectGridStructure();
        fetchCloudData();
    });

    function initializeDateTracking() {
        const localTimeInstance = new Date();
        const localizedDaysArray = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
        currentDayOfWeek = localizedDaysArray[localTimeInstance.getDay()];
        
        const calendarYear = localTimeInstance.getFullYear();
        const calendarMonth = String(localTimeInstance.getMonth() + 1).padStart(2, '0');
        const calendarDay = String(localTimeInstance.getDate()).padStart(2, '0');
        currentISODate = `${calendarYear}-${calendarMonth}-${calendarDay}`;

        const readableFormatString = localTimeInstance.toLocaleDateString('ar-SA', { month: 'long', day: 'numeric', year: 'numeric' });
        document.getElementById('current-date-display').innerText = `${currentDayOfWeek}، ${readableFormatString}`;
    }

    function renderSubjectGridStructure() {
        const gridRootElement = document.getElementById('subjects-display-grid');
        gridRootElement.innerHTML = '';
        const todaysScheduledSubjects = WEEKLY_SCHEDULE_MAP[currentDayOfWeek] || [];
        let finalProcessingOrder = [...todaysScheduledSubjects];

        MASTER_SUBJECT_LIST.forEach(sub => {
            if (!finalProcessingOrder.includes(sub)) finalProcessingOrder.push(sub);
        });

        finalProcessingOrder.forEach(subjectName => {
            const isCurrentlyScheduled = todaysScheduledSubjects.includes(subjectName);
            const card = buildSubjectComponentMarkup(subjectName, isCurrentlyScheduled);
            gridRootElement.appendChild(card);
        });
    }

    function buildSubjectComponentMarkup(name, isScheduled) {
        const cardContainer = document.createElement('article');
        cardContainer.className = `subject-card ${isScheduled ? 'scheduled' : 'not-scheduled'}`;
        cardContainer.dataset.subjectName = name;

        cardContainer.innerHTML = `
            <div class="subject-header">
                <span class="subject-title">${name}</span>
                ${isScheduled ? `<span class="badge badge-scheduled">مجدولة اليوم</span>` : `<span class="badge badge-not-scheduled">غير مجدولة اليوم</span>`}
            </div>
            <div class="field-group">
                <label class="field-label" for="input-${name}-assignments">الواجبات</label>
                <textarea id="input-${name}-assignments" class="field-input" data-field-type="assignments" disabled placeholder="لا توجد واجبات مسجلة."></textarea>
            </div>
            <div class="field-group">
                <label class="field-label" for="input-${name}-projects">المشاريع</label>
                <textarea id="input-${name}-projects" class="field-input" data-field-type="projects" disabled placeholder="لا توجد مشاريع مسجلة."></textarea>
            </div>
            <div class="field-group">
                <label class="field-label" for="input-${name}-summaries">الملخصات (روابط PDF أو صور)</label>
                <textarea id="input-${name}-summaries" class="field-input" data-field-type="summaries" disabled placeholder="لا توجد ملخصات متوفرة."></textarea>
                <div id="link-preview-${name}" class="link-preview-container"></div>
            </div>
        `;
        return cardContainer;
    }

    // جلب البيانات من السحابة تلقائياً لجميع الطلاب والأجهزة
    function fetchCloudData() {
        fetch(`${FIREBASE_DB_URL}/${currentISODate}.json`)
        .then(res => res.json())
        .then(data => {
            // تفريغ المدخلات أولاً لضمان دقة العرض المحدث
            const textareas = document.querySelectorAll('.field-input');
            textareas.forEach(input => input.value = '');

            if (data) {
                textareas.forEach(input => {
                    const sub = input.closest('.subject-card').dataset.subjectName;
                    const type = input.dataset.fieldType;
                    if (data[sub] && data[sub][type]) {
                        input.value = data[sub][type];
                    }
                });
            }
            generateAutomatedSummary();
            updateSummariesLinks();
        }).catch(err => console.error("خطأ في جلب البيانات:", err));
    }

    function updateSummariesLinks() {
        MASTER_SUBJECT_LIST.forEach(subjectName => {
            const targetInput = document.getElementById(`input-${subjectName}-summaries`);
            const previewContainer = document.getElementById(`link-preview-${subjectName}`);
            if (targetInput && previewContainer) {
                const value = targetInput.value.trim();
                if (value.startsWith('http://') || value.startsWith('https://')) {
                    previewContainer.innerHTML = `<a href="${value}" target="_blank">🔗 فتح ملف الملخص المرفق (PDF/صورة)</a>`;
                } else {
                    previewContainer.innerHTML = '';
                }
            }
        });
    }

    function generateAutomatedSummary() {
        const displayDestination = document.getElementById('summary-view');
        const processingClassesList = WEEKLY_SCHEDULE_MAP[currentDayOfWeek] || [];

        if (processingClassesList.length === 0) {
            displayDestination.innerHTML = `<strong>لا توجد مواد مجدولة اليوم (عطلة نهاية الأسبوع).</strong>`;
            return;
        }

        let html = `<p>واجبات اليوم مرتبة سحابياً حسب الجدول الدراسي:</p><ol class="summary-list">`;
        processingClassesList.forEach(subjectName => {
            const el = document.getElementById(`input-${subjectName}-assignments`);
            let txt = el ? el.value.trim() : "";
            if (!txt) txt = `<em>(لم يتم إدخال واجب)</em>`;
            html += `<li><strong>${subjectName}</strong> — ${txt}</li>`;
        });
        html += `</ol>`;
        displayDestination.innerHTML = html;
    }

    function openPasswordModal() {
        if (document.body.classList.contains('edit-mode')) { terminateEditSessionMode(); return; }
        document.getElementById('modal-error-txt').style.display = 'none';
        document.getElementById('admin-password-input').value = '';
        document.getElementById('password-modal-overlay').classList.add('active');
        setTimeout(() => document.getElementById('admin-password-input').focus(), 50);
    }

    function closePasswordModal() { document.getElementById('password-modal-overlay').classList.remove('active'); }
    function closePasswordModalViaOverlay(event) { if (event.target.id === 'password-modal-overlay') closePasswordModal(); }
    function handleModalKeyDown(event) { if (event.key === 'Enter') submitPasswordVerification(); }

    function submitPasswordVerification() {
        if (document.getElementById('admin-password-input').value === PROTECTION_KEY) {
            closePasswordModal();
            initializeActiveEditingEnvironment();
        } else {
            document.getElementById('modal-error-txt').style.display = 'block';
        }
    }

    function initializeActiveEditingEnvironment() {
        document.body.classList.add('edit-mode');
        document.getElementById('enter-edit-btn').innerText = "🔒 قفل النظام";
        document.getElementById('enter-edit-btn').className = "btn btn-secondary";
        document.querySelectorAll('.field-input').forEach(field => field.removeAttribute('disabled'));
    }

    function terminateEditSessionMode() {
        document.body.classList.remove('edit-mode');
        document.getElementById('enter-edit-btn').innerText = "🔒 تفعيل التعديل";
        document.getElementById('enter-edit-btn').className = "btn btn-primary";
        document.querySelectorAll('.field-input').forEach(field => field.setAttribute('disabled', 'true'));
    }

    // حفظ التعديلات وإرسالها الفوري للسحابة لقراءتها من كل الأجهزة والطلاب
    function saveAllEdits() {
        const payload = {};
        MASTER_SUBJECT_LIST.forEach(sub => {
            payload[sub] = {
                assignments: document.getElementById(`input-${sub}-assignments`).value.trim(),
                projects: document.getElementById(`input-${sub}-projects`).value.trim(),
                summaries: document.getElementById(`input-${sub}-summaries`).value.trim()
            };
        });

        fetch(`${FIREBASE_DB_URL}/${currentISODate}.json`, {
            method: 'PUT',
            body: JSON.stringify(payload)
        })
        .then(() => {
            terminateEditSessionMode();
            generateAutomatedSummary();
            updateSummariesLinks();
            alert("تم حفظ البيانات وتحديثها سحابياً لجميع الطلاب بنجاح! 🎉");
        })
        .catch(err => alert("حدث خطأ أثناء الحفظ السحابي: " + err));
    }

    function cancelEditing() { fetchCloudData(); terminateEditSessionMode(); }

    function clearCurrentDateData() {
        if (!confirm("هل أنت متأكد من حذف بيانات اليوم من السحابة نهائياً؟")) return;

        fetch(`${FIREBASE_DB_URL}/${currentISODate}.json`, { method: 'DELETE' })
        .then(() => {
            terminateEditSessionMode();
            fetchCloudData();
        });
    }
</script>

</body>
</html>
